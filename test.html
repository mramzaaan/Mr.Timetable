<!DOCTYPE html>
<html>
<head>
<style>
  table { width: 100%; height: 500px; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid black; }
  th { height: 40px; }
  td { height: 1px; }
  .content { height: 100%; background: lightblue; }
</style>
</head>
<body>
  <table>
    <thead>
      <tr><th>Header</th></tr>
    </thead>
    <tbody>
      <tr><td><div class="content">A<br>B<br>C<br>D<br>E</div></td></tr>
      <tr><td><div class="content">B</div></td></tr>
      <tr><td><div class="content">C</div></td></tr>
    </tbody>
  </table>
</body>
</html>
